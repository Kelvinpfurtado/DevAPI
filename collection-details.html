<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="collections.html">Collections</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="history.html">History</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="team.html">Team</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="profile.html">Profile</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="main-content">
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">
        <h2 id="collectionTitle">Collection</h2>
        <a href="add-request.html" class="btn btn-success">+ Add Request</a>
    </div>

    <div class="mt-4" id="requestsContainer"></div>

</div>
</div>

<!-- VIEW MODAL -->
<div class="modal fade" id="viewModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Request Details</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p><strong>Method:</strong> <span id="viewMethod"></span></p>
                <p><strong>URL:</strong> <span id="viewUrl"></span></p>

                <h6>Body:</h6>

                <pre id="viewBody"></pre>
            </div>

        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 DevAPI Platform | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const userId = localStorage.getItem("userId");

if (!userId) {
    window.location.href = "login.html";
}

const params = new URLSearchParams(window.location.search);

const collectionName = params.get("name");

const ownerId =
    params.get("ownerId")
    || localStorage.getItem("userId");

console.log("OWNER ID:", ownerId);
console.log("COLLECTION:", collectionName);

document.getElementById("collectionTitle").innerText =
    collectionName;


// LOAD REQUESTS
async function loadRequests() {

    try {

        const res = await fetch(
            "http://localhost:3000/api/collection/" +
            encodeURIComponent(collectionName) +
            "/" +
            ownerId
        );

        const data = await res.json();

        const container =
            document.getElementById("requestsContainer");

        container.innerHTML = "";

        // EMPTY
        if (!data.requests || data.requests.length === 0) {

            container.innerHTML = `
                <div class="text-center mt-5">
                    <p>No requests in this collection</p>

                    <a href="add-request.html"
                        class="btn btn-primary">

                        Add Request

                    </a>
                </div>
            `;

            return;
        }

        // RENDER REQUESTS
        data.requests.forEach((req, index) => {

            container.innerHTML += `
                <div class="card p-3 mb-3">

                    <strong>
                        ${req.method} ${req.url}
                    </strong>

                    <div class="mt-2">

                        <button
                            class="btn btn-sm btn-info"
                            onclick='viewRequest(${JSON.stringify(req)})'>

                            View

                        </button>

                        <button
                            class="btn btn-sm btn-warning"
                            onclick='editRequest(${JSON.stringify(req)}, ${index})'>

                            Edit

                        </button>

                        <button
                            class="btn btn-sm btn-danger"
                            onclick="deleteRequest(${index})">

                            Delete

                        </button>

                    </div>

                </div>
            `;
        });

    } catch (err) {

        console.log(err);

    }
}


// VIEW
function viewRequest(req) {

    document.getElementById("viewMethod").innerText =
        req.method;

    document.getElementById("viewUrl").innerText =
        req.url;

    document.getElementById("viewBody").innerText =
        req.body
        ? JSON.stringify(req.body, null, 2)
        : "{}";

    new bootstrap.Modal(
        document.getElementById("viewModal")
    ).show();
}


// EDIT
function editRequest(req, index) {

    localStorage.setItem(
        "editRequestData",
        JSON.stringify(req)
    );

    localStorage.setItem("editIndex", index);

    localStorage.setItem(
        "editCollection",
        collectionName
    );

    localStorage.setItem(
        "editOwnerId",
        ownerId
    );

    localStorage.setItem(
        "editMode",
        "true"
    );

    window.location.href = "edit-request.html";
}


// DELETE
async function deleteRequest(index) {

    await fetch(
        "http://localhost:3000/api/collections/delete",
        {
            method: "POST",
            headers: {
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                collectionName,
                index,
                userId: ownerId
            })
        }
    );

    loadRequests();
}


// INIT
loadRequests();

</script>

</body>
</html>
