<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams - DevAPI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="collections.html">Collections</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="history.html">History</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="team.html">Team</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="profile.html">Profile</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="main-content">
<div class="container mt-5">

    <!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Teams</h2>

    <div>

        <button class="btn btn-outline-success me-2"
            onclick="loadInvitations()"
            data-bs-toggle="modal"
            data-bs-target="#invitationListModal">

            View Invitations

        </button>

        <button class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#createTeamModal">

            + Create Team

        </button>

    </div>

</div>

    <!-- TEAM LIST -->
    <div id="teamsContainer" class="row g-4"></div>

</div>
</div>

<!-- CREATE TEAM MODAL -->
<div class="modal fade" id="createTeamModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Create Team</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input
                    type="text"
                    id="teamName"
                    class="form-control"
                    placeholder="Enter team name">

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="createTeam()">
                    Create
                </button>
            </div>

        </div>
    </div>
</div>

<!-- INVITE MODAL -->
<div class="modal fade" id="inviteModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Invite Member</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input
                    type="email"
                    id="inviteEmail"
                    class="form-control"
                    placeholder="Enter member email">

            </div>

            <div class="modal-footer">
                <button class="btn btn-success" onclick="sendInvite()">
                    Send Invite
                </button>
            </div>

        </div>
    </div>
</div>

<!-- INVITATION LIST MODAL -->
<div class="modal fade" id="invitationListModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Pending Invitations</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div id="invitationContainer"></div>

            </div>

        </div>
    </div>
</div>


<!-- SHARE COLLECTION MODAL -->
<div class="modal fade" id="shareModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Share Collection</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <select
                    id="collectionSelect"
                    class="form-select">

                </select>

            </div>

            <div class="modal-footer">

                <button class="btn btn-success"
                    onclick="shareCollection()">

                    Share

                </button>

            </div>

        </div>
    </div>
</div>



<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 DevAPI Platform | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const userId = localStorage.getItem("userId");

if (!userId) {
    window.location.href = "login.html";
}

let selectedTeamId = null;
let shareTeamId = null;


// LOAD TEAMS
async function loadTeams() {

    const res = await fetch(
        "http://localhost:3000/api/team/" +
userId + "/" +
localStorage.getItem("userEmail")
    );

    const data = await res.json();

    const container = document.getElementById("teamsContainer");

    container.innerHTML = "";

    // EMPTY
    if (data.length === 0) {

        container.innerHTML = `
            <div class="text-center mt-5">
                <p>No teams created yet</p>
            </div>
        `;

        return;
    }

    // RENDER
    data.forEach(team => {

        container.innerHTML += `
            <div class="col-md-4">

                <div class="card p-3">

                    <h5>${team.name}</h5>

                    <p>
                        Members:
                        ${team.members.length}
                    </p>

                    <p>
                        Invitations:
                        ${team.invitations.length}
                    </p>

<p>
    Shared Collections:
    ${team.sharedCollections.length}
</p>

<div class="mt-3">

    ${
        team.sharedCollections.length > 0
        ?
        team.sharedCollections.map(col => `

            <button
                class="btn btn-sm btn-success me-2 mb-2"
                onclick="openSharedCollection(
    			'${col.name}',
    			'${col.ownerId}'
		)">

                ${col.name}

            </button>

        `).join("")
        :
        `<span class="text-muted">
            No shared collections
        </span>`
    }

</div>

<button
    class="btn btn-outline-primary mb-2"
    onclick="openInvite('${team._id}')">

    Invite Member

</button>

<button
    class="btn btn-outline-success"
    onclick="openShare('${team._id}')">

    Share Collection

</button>

                </div>

            </div>
        `;
    });
}


// CREATE TEAM
async function createTeam() {

    const name = document.getElementById("teamName").value;

    if (!name) {
        alert("Enter team name");
        return;
    }

    await fetch("http://localhost:3000/api/team/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            ownerId: userId
        })
    });

    alert("Team created");

    const modal =
        bootstrap.Modal.getInstance(
            document.getElementById("createTeamModal")
        );

    modal.hide();

    loadTeams();
}


// OPEN INVITE
function openInvite(teamId) {

    selectedTeamId = teamId;

    new bootstrap.Modal(
        document.getElementById("inviteModal")
    ).show();
}


// SEND INVITE
async function sendInvite() {

    const email =
        document.getElementById("inviteEmail").value;

    if (!email) {
        alert("Enter email");
        return;
    }

    await fetch("http://localhost:3000/api/team/invite", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            teamId: selectedTeamId,
            email
        })
    });

    alert("Invitation sent");

    const modal =
        bootstrap.Modal.getInstance(
            document.getElementById("inviteModal")
        );

    modal.hide();

    loadTeams();
}

// LOAD INVITATIONS
async function loadInvitations() {

    const email = localStorage.getItem("userEmail");

    const res = await fetch(
        "http://localhost:3000/api/team/invitations/" + email
    );

    const data = await res.json();

    const container =
        document.getElementById("invitationContainer");

    container.innerHTML = "";

    // EMPTY
    if (data.length === 0) {

        container.innerHTML = `
            <p class="text-center">
                No invitations
            </p>
        `;

        return;
    }

    // RENDER
    data.forEach(team => {

        container.innerHTML += `
            <div class="card p-3 mb-3">

                <h5>${team.name}</h5>

                <button
                    class="btn btn-success btn-sm mt-2"
                    onclick="acceptInvitation('${team._id}')">

                    Accept

                </button>

            </div>
        `;
    });
}


// ACCEPT INVITATION
async function acceptInvitation(teamId) {

    const email = localStorage.getItem("userEmail");

    await fetch("http://localhost:3000/api/team/accept", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            teamId,
            email
        })
    });

    alert("Invitation accepted");

    loadInvitations();
    loadTeams();
}


// OPEN SHARE MODAL
async function openShare(teamId) {

    shareTeamId = teamId;

    const userId = localStorage.getItem("userId");

    const res = await fetch(
        "http://localhost:3000/api/collections/" + userId
    );

    const data = await res.json();

    const select =
        document.getElementById("collectionSelect");

    select.innerHTML = "";

    data.forEach(col => {

        select.innerHTML += `
            <option value="${col.name}">
                ${col.name}
            </option>
        `;
    });

    new bootstrap.Modal(
        document.getElementById("shareModal")
    ).show();
}


// SHARE COLLECTION
async function shareCollection() {

    const collectionName =
        document.getElementById("collectionSelect").value;

    await fetch(
        "http://localhost:3000/api/team/share-collection",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
body: JSON.stringify({
    teamId: shareTeamId,
    collectionName,
    ownerId: localStorage.getItem("userId")
})
        }
    );

    alert("Collection shared");

    // CLOSE MODAL
const modal =
    bootstrap.Modal.getInstance(
        document.getElementById("shareModal")
    );

if (modal) modal.hide();
}


function openSharedCollection(name, ownerId) {

    console.log("OPENING:", name, ownerId);

    if (!ownerId || ownerId === "undefined") {

        alert("Shared collection owner missing");

        return;
    }

    const url =
        "collection-details.html?name=" +
        encodeURIComponent(name) +
        "&ownerId=" +
        encodeURIComponent(ownerId);

    console.log(url);

    window.location.href = url;
}


// INIT
loadTeams();

</script>

</body>
</html>
