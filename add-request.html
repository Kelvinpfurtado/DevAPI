    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <!-- TOGGLER -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="collections.html">Collections</a>
                </li>

                </li>

                    <a class="nav-link" href="profile.html">Profile</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="main-content">
<div class="container mt-5 mb-5 d-flex justify-content-center">

    <div class="card p-4" style="width: 500px;">

        <h3>Add Request</h3>

        <form class="mt-3">

            <div class="mb-3">
                <label>Request Name</label>
                <input type="text" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label>Method</label>
                <select class="form-select">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                </select>
            </div>

            <div class="mb-3">
                <label>API URL</label>
                <input type="text" class="form-control" placeholder="Enter API URL">
            </div>

            <div class="mb-3">
                <label>Headers</label>
                <input type="text" class="form-control" placeholder="Key: Value">
            </div>

            <div class="mb-3">
                <label>Body (JSON)</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>

            <button class="btn btn-primary">Save</button>
            <a href="collection-details.html" class="btn btn-secondary">Cancel</a>

        </form>

    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
