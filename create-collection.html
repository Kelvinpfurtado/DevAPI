    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="collections.html">Collections</a>

                <li class="nav-item">

<div class="main-content">
<div class="container mt-5 mb-5 d-flex justify-content-center">

    <div class="card p-4" style="width: 500px;">

        <h3>Create New Collection</h3>

        <form class="mt-3" onsubmit="event.preventDefault(); createCollection();">

            <div class="mb-3">
                <label>Collection Name</label>
                <input id="collectionName" type="text" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label>Description</label>
                <input id="descInput" type="text" class="form-control" placeholder="Optional description">
            </div>

            <button class="btn btn-primary">Create</button>
            <a href="collections.html" class="btn btn-secondary">Cancel</a>

        </form>

    </div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 DevAPI Platform | All Rights Reserved</p>
</footer>

<script>
if (!localStorage.getItem("userId")) {
    window.location.href = "login.html";
}
</script>

<script>
async function createCollection() {

    const name = document.getElementById("collectionName").value;
    const userId = localStorage.getItem("userId");

    if (!name) {
        alert("Enter collection name");
        return;
    }

    await fetch("http://localhost:3000/api/collections/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            userId   // 🔥 IMPORTANT
        })
    });

    alert("Collection created");
    window.location.href = "collections.html";
}
</script>
</body>
</html>
