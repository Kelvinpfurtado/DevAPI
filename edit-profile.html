    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <!-- TOGGLER -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

            </ul>
        </div>

<!-- CONTENT -->
<div class="container mt-5 mb-5 flex-grow-1">

    <div class="d-flex justify-content-center">

        <div class="card p-4" style="width: 500px;">

            <h3>Edit Profile</h3>

            <div class="mt-3">
                <label>Name</label>
                <input type="text" class="form-control" value="Kelvin">
            </div>

            <div class="mt-3">
                <label>Email</label>
                <input type="email" class="form-control" value="kelvin@email.com">
            </div>

            <hr>

            <h5>Change Password</h5>

            <div class="mt-3">
                <label>Current Password</label>
                <input type="password" class="form-control">
            </div>

            <div class="mt-3">
                <label>New Password</label>
                <input type="password" class="form-control">
            </div>

            <div class="mt-3">
                <label>Confirm Password</label>
                <input type="password" class="form-control">
            </div>

            <div class="mt-4">
                <button class="btn btn-success me-2">Save Changes</button>
                <a href="profile.html" class="btn btn-secondary">Cancel</a>
            </div>

        </div>

    </div>

</div>
