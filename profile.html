</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <!-- TOGGLER -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>

                <li class="nav-item">

                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5 mb-5 flex-grow-1">

    <div class="d-flex justify-content-center">

        <div class="card p-4" style="width: 500px;">

            <h3>Profile</h3>

            <p><strong>Name:</strong> <span id="name"></span></p>
	    <p><strong>Email:</strong> <span id="email"></span></p>

            <hr>

            <h5>Stats</h5>
	    <p>Requests: <span id="requestsCount">0</span></p>
	    <p>Collections: <span id="collectionsCount">0</span></p>
            <hr>

            <a href="edit-profile.html" class="btn btn-primary mb-2">Edit Profile</a>
            <a href="index.html" class="btn btn-danger" onclick="logout()">Logout</a>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-auto">
    <p>© 2026 DevAPI Platform | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!localStorage.getItem("userId")) {
    window.location.href = "login.html";
}
</script>

<script>
const userId = localStorage.getItem("userId");

if (!userId) {
    window.location.href = "login.html";
}

async function loadProfile() {

    // 🔹 GET USER DATA
    const userRes = await fetch("http://localhost:3000/api/user/" + userId);
    const user = await userRes.json();

    if (user.error) {
        alert(user.error);
        return;
    }

    document.getElementById("name").innerText = user.name;
    document.getElementById("email").innerText = user.email;

    // 🔹 GET STATS (same as dashboard)
    const statsRes = await fetch("http://localhost:3000/api/dashboard/" + userId);
    const stats = await statsRes.json();

    document.getElementById("requestsCount").innerText = stats.requests;
    document.getElementById("collectionsCount").innerText = stats.collections;
}

loadProfile();
</script>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
