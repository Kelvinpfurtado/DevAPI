<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - DevAPI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="dashboard.html">DevAPI</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrivate">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarPrivate">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="collections.html">Collections</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="history.html">History</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="team.html">Team</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="profile.html">Profile</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="main-content">
<div class="container mt-5">

    <h2 class="mb-4">Request History</h2>

    <div id="historyContainer"></div>

</div>
</div>

<!-- VIEW RESPONSE MODAL -->
<div class="modal fade" id="responseModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">API Response</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <pre id="responseData"></pre>
            </div>

        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 DevAPI Platform | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const userId = localStorage.getItem("userId");

if (!userId) {
    window.location.href = "login.html";
}

async function loadHistory() {

    const res = await fetch("http://localhost:3000/api/history/" + userId);

    const data = await res.json();

    const container = document.getElementById("historyContainer");

    container.innerHTML = "";

    // EMPTY
    if (data.length === 0) {

        container.innerHTML = `
            <div class="text-center mt-5">
                <p>No request history yet</p>
            </div>
        `;

        return;
    }

    // RENDER
    data.forEach(item => {

        let badge = "secondary";

        if (item.method === "GET") badge = "success";
        if (item.method === "POST") badge = "primary";
        if (item.method === "PUT") badge = "warning";
        if (item.method === "DELETE") badge = "danger";

        container.innerHTML += `
            <div class="card p-3 mb-3">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <span class="badge bg-${badge}">
                            ${item.method}
                        </span>

                        <strong class="ms-2">
                            ${item.url}
                        </strong>

                        <div class="text-muted mt-1" style="font-size: 14px;">
                            Status: ${item.status}
                        </div>
                    </div>

                    <button class="btn btn-sm btn-info"
                        onclick='viewResponse(${JSON.stringify(item.response)})'>
                        View
                    </button>

                </div>

            </div>
        `;
    });
}

function viewResponse(response) {

    document.getElementById("responseData").innerText =
        JSON.stringify(response, null, 2);

    new bootstrap.Modal(
        document.getElementById("responseModal")
    ).show();
}

loadHistory();

</script>

</body>
</html>
